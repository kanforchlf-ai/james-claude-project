function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] ?? '').trim(); });
    return obj;
  });
}

function num(s) {
  if (!s || s === '') return null;
  // Remove commas (quoted CSV values like "1,115,536"), then parse
  const cleaned = String(s).replace(/,/g, '');
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : Math.round(n);
}

function renderBreakdown(items) {
  const active = items.filter(i => i.amount > 0).sort((a, b) => b.amount - a.amount);
  if (active.length === 0) return '';
  const total = active.reduce((s, i) => s + i.amount, 0);
  const segs = active.map((c, idx) => {
    const pct   = (c.amount / total * 100).toFixed(1);
    const color = idx === 0 ? (LABEL_COLORS[c.label] ?? '#0f766e') : (GRAY_SCALE[Math.min(idx - 1, GRAY_SCALE.length - 1)]);
    const tip   = `${c.label}　${pct}%　${fmtM(c.amount)}`.replace(/'/g, '&#39;');
    const label = idx === 0 ? `<span class="sbar-label">${c.label}　${pct}%</span>` : '';
    return `<div class="sbar-seg" style="width:${pct}%;background:${color}"
      onmouseenter="showTip(event,'${tip}')"
      onmousemove="moveTip(event)"
      onmouseleave="hideTip()">${label}</div>`;
  }).join('');
  return `<div class="sbar-wrap"><div class="sbar">${segs}</div></div>`;
}

function showTip(e, text) {
  const tip = document.getElementById('sbar-tip');
  tip.textContent = text;
  tip.classList.add('visible');
  moveTip(e);
}
function moveTip(e) {
  const tip = document.getElementById('sbar-tip');
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 32) + 'px';
}
function hideTip() {
  document.getElementById('sbar-tip').classList.remove('visible');
}

function loadAll() {
  const polRows  = parseCSV(CSV_POLITICIANS);
  const elecRows = parseCSV(CSV_ELECTIONS);
  const candRows = parseCSV(CSV_CANDIDATES);
  const donRows  = parseCSV(CSV_DONATION);
  const povRows  = parseCSV(CSV_POVERTY);

  // Politicians → DATA skeleton + POVERTY skeleton
  POLITICIAN_IDS = polRows.map(r => r['id']);
  for (const r of polRows) {
    DATA[r['id']] = {
      name:    r['姓名'],
      party:   r['政黨'],
      color:   r['顏色'],
      born:    r['生日']  || '待填入',
      gender:  r['性別'],
      initial: r['首字'],
      title:   r['職稱'] || '',
      elections: [],
    };
    POVERTY[r['id']] = {};
  }

  // Elections
  for (const r of elecRows) {
    const id = r['id'];
    if (!DATA[id]) continue;
    const yr = r['年份'];
    const cands = candRows.filter(c => c['id'] === id && c['年份'] === yr);
    const won  = r['當選'] === 'Y';
    const year = num(yr);
    // 任期起：若空白且有當選，預設為選舉年份
    const rawStart = num(r['任期起']);
    const rawEnd   = num(r['任期迄']);
    const termStart = rawStart ?? (won ? year : null);
    const termEnd   = rawEnd   ?? (termStart != null ? termStart + 3 : null);

    DATA[id].elections.push({
      year,
      name:             r['選舉名稱'],
      area:             r['選區'],
      won,
      ownVotes:         num(r['本人得票']),
      winnerName:       r['對手姓名']  || null,
      winnerVotes:      num(r['對手得票']),
      donationIncome:   num(r['獻金收入']),
      donationExpense:  num(r['獻金支出']),
      donationBalance:  num(r['獻金餘額']),
      termStart,
      termEnd,
      multiSeat:        r['多席次'] && r['多席次'].trim() === 'Y',
      candidates:       cands.length > 0
        ? cands.map(c => ({
            name:      c['姓名']   || null,
            party:     c['政黨']   || null,
            votes:     num(c['得票']),
            voteRate:  parseFloat(c['得票率']) || null,
            totalCand: num(c['共幾人選']),
            won:       c['當選'] === 'Y' ? true : c['當選'] === 'N' ? false : null,
          }))
        : null,
    });
  }

  // Poverty summary
  for (const r of povRows) {
    const id = r['id'];
    if (POVERTY[id] && r['年度'] && r['總身價']) {
      POVERTY[id][parseInt(r['年度'])] = parseInt(r['總身價']);
    }
  }

  // Donations — key: `${id}_${年份}`
  for (const r of donRows) {
    DONATION[`${r['id']}_${r['年份']}`] = {
      income:  num(r['收入總額']),
      expense: num(r['支出總額']),
    };
  }

  renderSidebar();
  show(POLITICIAN_IDS[0]);
}

/* ═══════════════════════════════════════════════════════
   計算 / 格式化
═══════════════════════════════════════════════════════ */

function calcSubsidy(e) {
  if (!e.ownVotes) return 0;
  // 不分區立委不適用選舉補助款
  if (e.area && e.area.includes('不分區')) return 0;
  if (e.multiSeat) {
    // 多席次：門檻 = 最低當選票數 × 0.5（從 candidates 取）
    let lowestWinner = null;
    if (e.candidates) {
      const winnerVotes = e.candidates
        .filter(c => c.won === true && c.votes != null)
        .map(c => c.votes);
      if (winnerVotes.length > 0) lowestWinner = Math.min(...winnerVotes);
    }
    if (!lowestWinner) return 0;
    return e.ownVotes >= lowestWinner * 0.5 ? e.ownVotes * 30 : 0;
  } else {
    // 單一名額：門檻 = 當選票數 / 3
    let ref = e.won ? e.ownVotes : e.winnerVotes;
    // 若 winnerVotes 未填，試從 candidates 陣列找當選人最高票
    if (!ref && !e.won && e.candidates) {
      const wv = e.candidates.filter(c => c.won === true && c.votes != null).map(c => c.votes);
      if (wv.length > 0) ref = Math.max(...wv);
    }
    if (!ref) return 0;
    return e.ownVotes >= ref / 3 ? e.ownVotes * 30 : 0;
  }
}

/* 決定要顯示哪些候選人
   - 單一名額：本人 + 前兩名（票數最高）
   - 多名額：本人 + 所有當選者 + 得票率 ≥ 20% 者 */
function filterCandidatesForDisplay(candidates, selfName) {
  if (!candidates || candidates.length === 0) return candidates;
  const winners = candidates.filter(c => c.won === true);
  const isMultiWinner = winners.length > 1;
  if (!isMultiWinner) {
    // 單一名額：取票數前兩名
    const sorted = [...candidates]
      .filter(c => c.votes != null)
      .sort((a, b) => b.votes - a.votes);
    const top2Names = new Set(sorted.slice(0, 2).map(c => c.name));
    return candidates.filter(c => c.name === selfName || top2Names.has(c.name));
  } else {
    // 多名額：本人 + 當選者 + 得票率 ≥ 20%
    return candidates.filter(c =>
      c.name === selfName ||
      c.won === true ||
      (c.voteRate != null && c.voteRate >= 20)
    );
  }
}


function fmt(n)  { return n.toLocaleString('zh-TW'); }

function fmtM(n) {
  const abs = Math.abs(n);
  let s;
  if (abs >= 1e8) s = (abs / 1e8).toFixed(1) + ' 億';
  else if (abs >= 1e4) s = Math.round(abs / 1e4).toLocaleString('zh-TW') + ' 萬';
  else s = abs.toLocaleString('zh-TW');
  return (n < 0 ? '－' : '') + s;
}

function fmtSign(n) {
  return (n >= 0 ? '＋' : '－') + fmtM(Math.abs(n));
}

function render(id) {
  const p = DATA[id];

  const wonCount      = elections.filter(e => e.won).length;
  // 單次最高得票：排除不分區
  const withVotes     = elections.filter(e => e.ownVotes != null && !(e.area && e.area.includes('不分區')));
  const bestElection  = withVotes.length ? withVotes.reduce((a, b) => a.ownVotes > b.ownVotes ? a : b) : null;
  const subsidies     = elections.map(e => ({ e, s: calcSubsidy(e) })).filter(x => x.s > 0);
  const bestSubsidy   = subsidies.length ? subsidies.reduce((a, b) => a.s > b.s ? a : b) : null;

  // 主要政治獻金收入類型：累加所有選舉的收入細項，取佔比最高
  const incomeTotal = {};
  elections.forEach(e => {
    const bd = DONATION_BREAKDOWN[`${id}_${e.year}`];
    if (!bd || !bd.income) return;
    bd.income.forEach(item => {
      if (item.amount > 0) incomeTotal[item.label] = (incomeTotal[item.label] || 0) + item.amount;
    });
  });
  const incomeEntries = Object.entries(incomeTotal).sort((a, b) => b[1] - a[1]);
  const topIncomeLabel = incomeEntries.length ? incomeEntries[0][0] : null;
  const topIncomeTotal = incomeEntries.length ? incomeEntries.reduce((s, [, v]) => s + v, 0) : 0;
  const topIncomePct   = topIncomeLabel ? (incomeTotal[topIncomeLabel] / topIncomeTotal * 100).toFixed(1) : null;

  /* KPI */
  const kpiHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">參選次數</div>
        <div class="kpi-value">${elections.length}<span class="unit"> 次</span></div>
        <div class="kpi-sub">當選 ${wonCount}・未當選 ${elections.length - wonCount}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">單次最高得票
          <span class="kpi-info" title="不統計不分區立委選舉得票">ⓘ</span>
        </div>
        <div class="kpi-value" style="font-size:1.2rem">${bestElection ? fmt(bestElection.ownVotes) : '—'}</div>
        <div class="kpi-sub">${bestElection ? `${bestElection.year}　${bestElection.name}` : '待填入'}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">最高選舉補助款</div>
        <div class="kpi-value" style="font-size:1.2rem;color:#059669">${bestSubsidy ? fmtM(bestSubsidy.s) : '—'}</div>
        <div class="kpi-sub">${bestSubsidy ? `${bestSubsidy.e.year}　${bestSubsidy.e.name}` : '無資料'}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">主要獻金收入類型</div>
        <div class="kpi-value" style="font-size:1rem;color:#1e40af;line-height:1.3">
          ${topIncomeLabel ?? '—'}
        </div>
        <div class="kpi-sub">${topIncomePct ? `佔總收入 ${topIncomePct}%` : '無資料'}</div>
      </div>
    </div>`;

  /* 財產資料（迴圈前先備好，Level 3 和明細都會用） */
  const pov = POVERTY[id];
  const povYears = Object.keys(pov).map(Number).sort((a, b) => a - b);

  /* Election blocks — 最新 → 最舊 */
  let blocksHTML = '';
  for (const e of [...elections].sort((a, b) => b.year - a.year)) {
    // 若有 candidates 陣列，ownVotes 從本人那列取
    const selfCand = e.candidates ? e.candidates.find(c => c.name === p.name) : null;
    const ownVotes = e.ownVotes ?? (selfCand ? selfCand.votes : null);

    const subsidy = calcSubsidy({ ...e, ownVotes });
    const donIncome  = e.donationIncome;
    const donExpense = e.donationExpense;

    /* 得票顯示：統一用長條圖，依得票數高→低排序，本人 highlight */
    let barsData = [];
    if (e.candidates) {
      const displayCands = filterCandidatesForDisplay(e.candidates, p.name);
      barsData = displayCands
        .filter(c => c.votes != null)
        .sort((a, b) => b.votes - a.votes);
    } else if (ownVotes != null) {
      barsData = [{ name: p.name, party: p.party, votes: ownVotes, voteRate: null, won: e.won }];
      if (!e.won && e.winnerName && e.winnerVotes != null) {
        barsData.push({ name: e.winnerName, party: null, votes: e.winnerVotes, voteRate: null, won: true });
        barsData.sort((a, b) => b.votes - a.votes);
      }
    }

    let votesHTML;
    if (barsData.length === 0) {
      votesHTML = `<p class="val-muted" style="font-size:0.8rem;padding:4px 0">得票數待填入</p>`;
    } else {
      const maxCandVotes = Math.max(...barsData.map(c => c.votes));
      const barsHTML = barsData.map(c => {
        const isSelf  = c.name === p.name;
        const barPct  = (c.votes / maxCandVotes * 100).toFixed(1);
        const fillColor = isSelf ? p.color : '#94a3b8';
        const rateStr = c.voteRate != null ? `${c.voteRate}%` : '';
        return `
          <div class="bar-row">
            <div class="bar-who">
              <span class="bar-name${isSelf ? ' is-self' : ''}">${c.name ?? '—'}</span>
              ${c.won === true ? '<span class="bar-won">✓ 當選</span>' : ''}
              <span class="bar-sub">${c.party ?? ''}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${barPct}%;background:${fillColor}">
                ${rateStr ? `<span class="bar-rate-label">${rateStr}</span>` : ''}
              </div>
            </div>
            <div class="bar-value">${fmt(c.votes)}</div>
          </div>`;
      }).join('');
      votesHTML = `<div class="cand-bars">${barsHTML}</div>`;
    }

    /* Level 2：金流 */
    // 不分區立委沒有選舉補助款，也通常沒有政治獻金專戶
    const isProportional = e.area && e.area.includes('不分區');
    const bdKey = `${id}_${e.year}`;
    const bd    = DONATION_BREAKDOWN[bdKey] || {};
    const incBD = !isProportional && donIncome  != null && bd.income  ? renderBreakdown(bd.income)  : '';
    const expBD = !isProportional && donExpense != null && bd.expense ? renderBreakdown(bd.expense) : '';

    const filingsHTML = !isProportional ? renderFilings(id, e.year) : '';

    const level2HTML = `
      <div class="level2">
        <div class="level-heading">金流</div>
        <div class="flow-block">
          <span class="flow-block-title">政治獻金</span>
          <div style="flex:1;min-width:0">
            <div class="flow-body" style="gap:16px;margin-bottom:${incBD||expBD?'8px':'0'}">
              <div class="flow-item">
                <span class="flow-item-label">收入總額</span>
                <span class="flow-item-value ${donIncome != null ? '' : 'val-muted'}">
                  ${donIncome != null ? fmtM(donIncome) : isProportional ? '不適用' : '無資料'}
                </span>
              </div>
              <div class="flow-item">
                <span class="flow-item-label">支出總額</span>
                <span class="flow-item-value ${donExpense != null ? '' : 'val-muted'}">
                  ${donExpense != null ? fmtM(donExpense) : isProportional ? '不適用' : '無資料'}
                </span>
              </div>
              <div class="flow-item">
                <span class="flow-item-label">首次申報餘額</span>
                <span class="flow-item-value ${
                  e.donationBalance == null ? 'val-muted'
                  : e.donationBalance >= 0  ? 'val-pos' : 'val-neg'}">
                  ${e.donationBalance != null ? fmtSign(e.donationBalance) : '無資料'}
                </span>
              </div>
            </div>
            ${incBD ? `<div style="margin-bottom:4px"><span class="flow-item-label">收入細項　</span>${incBD}</div>` : ''}
            ${expBD ? `<div style="margin-bottom:${filingsHTML?'4px':'0'}"><span class="flow-item-label">支出細項　</span>${expBD}</div>` : ''}
            ${filingsHTML}
          </div>
        </div>
        <div class="flow-block">
          <span class="flow-block-title">選舉補助款</span>
          <div class="flow-body">
            <div class="flow-item">
              <span class="flow-item-label">估計撥入</span>
              <span class="flow-item-value ${isProportional ? 'val-muted' : subsidy > 0 ? 'val-sub' : 'val-muted'}">
                ${isProportional ? '不適用' : subsidy > 0 ? '＋' + fmtM(subsidy) : '未達門檻'}
              </span>
            </div>
          </div>
        </div>
      </div>`;

    /* Level 3：財產申報摘要（就任 → 卸任，取任期內第一筆與最後一筆） */
    let level3HTML = '';
    if (e.won && e.termStart != null) {
      const termEnd = e.termEnd ?? e.termStart;
      const termYears = povYears.filter(y => y >= e.termStart && y <= termEnd);
      if (termYears.length > 0) {
        const firstYr = termYears[0];
        const lastYr  = termYears[termYears.length - 1];
        const firstVal = pov[firstYr];
        const lastVal  = pov[lastYr];
        let inner = `<span class="asset-year">就任</span><span class="asset-point">${firstYr}　${fmt(firstVal)} 萬</span>`;
        if (lastYr !== firstYr) {
          const delta = lastVal - firstVal;
          inner += `
            <span class="asset-arrow">→</span>
            <span class="asset-year">卸任</span>
            <span class="asset-point">${lastYr}　${fmt(lastVal)} 萬</span>
            <span class="asset-delta ${delta >= 0 ? 'val-pos' : 'val-neg'}">${fmtSign(delta)}</span>`;
        }
        level3HTML = `
          <div class="level3">
            <div class="level-heading">任期財產申報</div>
            <div class="asset-row">${inner}</div>
          </div>`;
      }
    }

    const totalCand = e.candidates ? (e.candidates[0]?.totalCand ?? null) : null;
    const totalStr  = totalCand != null ? `　共 ${totalCand} 人` : '';
    blocksHTML += `
      <div class="elec-block">
        <div class="elec-header">
          <span class="elec-name">${e.year}　${e.name}</span>
          <div class="elec-meta">
            <span class="elec-area">${e.area}${totalStr}</span>
            <span class="badge ${e.won ? 'badge-won' : 'badge-lost'}">${e.won ? '✓ 當選' : '✗ 未當選'}</span>
          </div>
        </div>
        ${votesHTML}
        ${level2HTML}
        ${level3HTML}
      </div>`;
  }

  /* 選舉明細 table */
  let elecRows = '';
  for (const e of elections) {
    const subsidy  = calcSubsidy(e);
    const isProp   = e.area && e.area.includes('不分區');
    const inc      = e.donationIncome;
    const exp      = e.donationExpense;
    const donBal   = e.donationBalance;
    elecRows += `
      <tr>
        <td>${e.year}</td>
        <td>${e.name}</td>
        <td>${e.area}</td>
        <td><span class="badge ${e.won ? 'badge-won' : 'badge-lost'}">${e.won ? '✓ 當選' : '✗ 未當選'}</span></td>
        <td class="td-r">${e.ownVotes != null ? fmt(e.ownVotes) : '<span class="text-muted">—</span>'}</td>
        <td class="td-r">${(!e.won && e.winnerName && e.winnerVotes != null)
          ? `${fmt(e.winnerVotes)}<br><span style="color:#bbb;font-size:0.7rem">${e.winnerName}</span>`
          : '<span class="text-muted">—</span>'}</td>
        <td class="td-r ${inc != null ? '' : 'text-muted'}">${inc != null ? fmtM(inc) : isProp ? '—' : '無資料'}</td>
        <td class="td-r ${exp != null ? '' : 'text-muted'}">${exp != null ? fmtM(exp) : isProp ? '—' : '無資料'}</td>
        <td class="td-r ${donBal != null ? (donBal >= 0 ? 'text-pos' : 'text-neg') : 'text-muted'}">
          ${donBal != null ? fmtSign(donBal) : '—'}</td>
        <td class="td-r ${isProp ? 'text-muted' : subsidy > 0 ? 'text-pos' : 'text-muted'}">
          ${isProp ? '不適用' : subsidy > 0 ? fmtM(subsidy) : '—'}</td>
      </tr>`;
  }

  /* 任期財產申報明細 table — 所有有資料的年度都列出 */

  // 建立「哪個任期」的快速查詢：年度 → 對應的勝選 election
  const termMap = {};
  for (const e of elections) {
    if (!e.won || e.termStart == null) continue;
    const end = e.termEnd ?? e.termStart;
    for (let y = e.termStart; y <= end; y++) termMap[y] = e;
  }

  let assetRows = '';
  povYears.forEach((yr, i) => {
    const val   = pov[yr];
    const prev  = i > 0 ? pov[povYears[i - 1]] : null;
    const delta = prev != null ? val - prev : null;
    const termE = termMap[yr];
    const termLabel = termE
      ? `<span style="font-size:0.7rem;color:#94a3b8">${termE.year} ${termE.name}</span>`
      : `<span style="font-size:0.7rem;color:#d1d5db">—</span>`;
    assetRows += `
      <tr>
        <td>${yr}</td>
        <td>${termLabel}</td>
        <td class="td-r" style="font-weight:600">${fmt(val)} 萬</td>
        <td class="td-r ${delta == null ? 'text-muted' : delta >= 0 ? 'text-pos' : 'text-neg'}">
          ${delta != null ? fmtSign(delta) + ' 萬' : '—'}</td>
      </tr>`;
  });

  const assetSection = assetRows
    ? `<div class="section">
        <div class="section-title">任期財產申報明細</div>
        <table>
          <thead>
            <tr>
              <th>申報年度</th><th>對應任期</th>
              <th class="td-r">總身價（萬）</th><th class="td-r">較上年</th>
            </tr>
          </thead>
          <tbody>${assetRows}</tbody>
        </table>
      </div>`
    : '';

  /* 親屬關係段落 */
  const relatives = RELATIVES[id] || [];
  const relSection = `<div class="section">
    <div class="section-title">親屬關係</div>
    ${relatives.length
      ? `<table>
          <thead><tr><th>關係</th><th>姓名</th><th>區域</th></tr></thead>
          <tbody>${relatives.map(r => `<tr><td style="color:#666">${r.relation}</td><td><strong>${r.name}</strong></td><td style="color:#bbb">${r.region}</td></tr>`).join('')}</tbody>
        </table>
        <p style="font-size:0.72rem;color:#bbb;margin-top:8px">資料來源：readr-media ccm_search.csv</p>`
      : `<p style="color:#bbb;font-size:0.85rem;padding:4px 0">無親屬關係記錄（資料以縣市議員為主）</p>`}
  </div>`;

  return `
    <div class="profile">
      <div class="profile-avatar" style="background:${partyColor(p.party)}">${p.initial}</div>
      <div class="profile-info">
        <h2>${p.name}<span class="party-badge" style="background:${partyColor(p.party)}">${p.party}</span></h2>
        <div class="meta">
          <span>${p.gender}</span>
          <span>${p.born}</span>
        </div>
      </div>
    </div>
    ${kpiHTML}
    <div class="section">
      <div class="section-title">選舉與金流</div>
      ${blocksHTML}
    </div>
    <div class="section">
      <div class="section-title">選舉明細</div>
      <table>
        <thead>
          <tr>
            <th>年份</th><th>選舉</th><th>選區</th><th>結果</th>
            <th class="td-r">本人得票</th><th class="td-r">當選者得票</th>
            <th class="td-r">獻金收入</th><th class="td-r">獻金支出</th>
            <th class="td-r">獻金餘額</th><th class="td-r">補助款（估）</th>
          </tr>
        </thead>
        <tbody>${elecRows}</tbody>
      </table>
    </div>
    ${assetSection}
    ${relSection}`;
}

/* ═══════════════════════════════════════════════════════
   Navigation
═══════════════════════════════════════════════════════ */

let currentId = 'tsai';

function show(id) {
  currentId = id;
  document.querySelectorAll('.politician-btn').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'btn-' + id);
  });
  document.getElementById('main-content').innerHTML = render(id);
}

/* ── Init ── */
loadAll();
</script>
