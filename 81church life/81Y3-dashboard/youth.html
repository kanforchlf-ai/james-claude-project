<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<script>
(function(){var t=localStorage.getItem('theme_81y3');if(t==='light'){document.documentElement.setAttribute('data-theme','light');}})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  const KEY = 'auth_81y3';
  const CORRECT = '5281';
  if (sessionStorage.getItem(KEY) !== CORRECT) {
    const input = prompt('請輸入密碼');
    if (input !== CORRECT) {
      document.documentElement.innerHTML = '<div style="font-family:sans-serif;text-align:center;margin-top:20%;color:#999">密碼錯誤</div>';
      throw new Error('unauthorized');
    }
    sessionStorage.setItem(KEY, CORRECT);
  }
})();
</script>
<title>青年大區 出席統計</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0f0f1a;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .logo {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 48px;
  }

  .district-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 680px;
  }

  @media (max-width: 480px) {
    .district-grid { grid-template-columns: 1fr; max-width: 320px; }
  }

  .district-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 20px 28px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .district-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.06);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .district-card:hover { transform: translateY(-6px); }
  .district-card:hover::before { opacity: 1; }

  .dc-y1 { background: linear-gradient(145deg, #1e3c72, #2a5298); box-shadow: 0 4px 20px rgba(42,82,152,0.4); }
  .dc-y2 { background: linear-gradient(145deg, #134e5e, #71b280); box-shadow: 0 4px 20px rgba(113,178,128,0.4); }
  .dc-y3 { background: linear-gradient(145deg, #7b2d8b, #a855f7); box-shadow: 0 4px 20px rgba(168,85,247,0.4); }

  .dc-icon { font-size: 42px; }
  .dc-num {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    opacity: 0.65;
    text-transform: uppercase;
  }
  .dc-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .dc-badge {
    font-size: 11px;
    background: rgba(255,255,255,0.18);
    padding: 3px 10px;
    border-radius: 20px;
    opacity: 0.85;
  }
  .dc-badge.soon {
    background: rgba(255,255,255,0.08);
    opacity: 0.45;
    font-style: italic;
  }

  .footer {
    margin-top: 48px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }
</style>
<link rel="stylesheet" href="theme.css">
</head>

    <div class="dc-name">青年一區</div>

  </a>

  <a href="y2/index.html" class="district-card dc-y2">
    <div class="dc-icon">🌿</div>
    <div class="dc-num">DISTRICT 2</div>

    <div class="dc-icon">⚡</div>
    <div class="dc-num">DISTRICT 3</div>
    <div class="dc-name">青年三區</div>

  </a>
</div>
