let currentScope = 'youth';

let genderFilter = 'all';
let ageFilter = new Set(['all']);   // 可複選
let chartInstance = null;

function ageIsAll() { return ageFilter.has('all') || ageFilter.size === 0; }
function selectedAges() { return [...ageFilter].filter(a => a !== 'all'); }

function getSegLabel() {
  const parts = [];
  if (genderFilter !== 'all') parts.push(SEG_LABELS[genderFilter]);
  if (!ageIsAll()) parts.push(selectedAges().map(a => SEG_LABELS[a]).join('+'));
  return parts.join('·') || '全部';
}

function getSegData(dk, act) {
  const d = TREND_DATA.districts[dk];
  if (!d) return Array(19).fill(0);
  const weeks = (d[act]['all'] || []).length || 19;

  // 若身份全選：依性別取單一 segment
  if (ageIsAll()) {
    const key = genderFilter === 'all' ? 'all' : genderFilter;
    return d[act][key] || d[act]['all'] || Array(weeks).fill(0);
  }
  // 否則把所選身份對應的 segment 相加
  const result = Array(weeks).fill(0);
  selectedAges().forEach(age => {
    const key = genderFilter === 'all' ? age : `${genderFilter}_${age}`;
    (d[act][key] || []).forEach((v, i) => { result[i] += v; });
  });
  return result;
}

// 計算目前篩選條件下的基數（從 MEMBER_DATA 計算）
const DK_TO_SUBS = {
  y1:['y1'], y2:['y2'], y3:['y3'],
  hs1:['hs1'], hs2:['hs2'], hs3:['hs3'],
  ms1:['ms1'], ms2:['ms2'],
  youth:['y1','y2','y3'], hs:['hs1','hs2','hs3'], ms:['ms1','ms2'],
  church:['y1','y2','y3','hs1','hs2','hs3','ms1','ms2'],
};
function getFilteredBase() {
  if (genderFilter === 'all' && ageIsAll()) return BASE_DATA[currentDk];
  const subs = DK_TO_SUBS[currentDk] || [];
  let count = 0;
  subs.forEach(dk => {
    (MEMBER_DATA[dk] || []).forEach(m => {
      if (genderFilter === 'male'   && m.g !== 'm') return;
      if (genderFilter === 'female' && m.g !== 'f') return;
      if (!ageIsAll() && !ageFilter.has(R_TO_KEY[m.r] || 'qingzhi')) return;
      count++;
    });
  });
  return count || 1;
}
function getFilteredBaseLabel() {
  if (genderFilter === 'all' && ageIsAll()) return `${DK_NAME[currentDk]}基數`;
  const parts = [];
  if (genderFilter !== 'all') parts.push(SEG_LABELS[genderFilter]);
  if (!ageIsAll()) parts.push(selectedAges().map(a => SEG_LABELS[a]).join('+'));
  return `篩選後（${parts.join('·')}）`;
}

function renderAll() { renderChart(); renderRates(); renderStats(); renderMembers(); }

function renderRates() {
  const base = getFilteredBase();
  const baseLabel = getFilteredBaseLabel();
  if (!BASE_DATA[currentDk]) { document.getElementById('rateRow').innerHTML = ''; return; }

  document.getElementById('rateRow').innerHTML =
    Object.entries(ACT_COLORS).map(([act, clr]) => {
      const vals = getSegData(currentDk, act);
      const last4 = vals.slice(-4);
      // 排除0（假期/無活動），若全為0則照算
      const nonZero = last4.filter(v => v > 0);
      const avg = nonZero.length ? nonZero.reduce((a,b)=>a+b,0)/nonZero.length : 0;
      const pct = base > 0 ? (avg / base * 100) : 0;
      const pctStr = pct.toFixed(1) + '%';
      const color = pct >= 80 ? '#27ae60' : pct >= 60 ? '#f39c12' : '#e74c3c';
      return `<div class="rate-card" style="border-top-color:${clr.border}">
        <div class="rate-pct" style="color:${color}">${pctStr}</div>
        <div class="rate-lbl">${act} 比率</div>
        <div class="rate-base">${avg.toFixed(1)} / ${base} 人</div>
        <div class="rate-bar-wrap"><div class="rate-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
        <div class="rate-note">分子：近4週出席人數平均${nonZero.length < 4 ? '（排除 '+(4-nonZero.length)+' 個停辦週）' : ''}<br>分母：${baseLabel} ${base} 人</div>
      </div>`;
    }).join('');
}

function renderMembers() {
  const el = document.getElementById('memberList');
  if (!['y1','y2','y3','hs1','hs2','hs3','ms1','ms2'].includes(currentDk)) { el.innerHTML = ''; return; }

  let members = (MEMBER_DATA[currentDk] || []).filter(m => {
    if (genderFilter === 'male'   && m.g !== 'm') return false;
    if (genderFilter === 'female' && m.g !== 'f') return false;
    if (!ageIsAll() && !ageFilter.has(R_TO_KEY[m.r] || 'qingzhi')) return false;
    return true;
  });

  const gIcon  = {m:'🙋', f:'🙋‍♀️'};
  const scope  = currentDk.startsWith('y') ? 'youth' : currentDk.startsWith('hs') ? 'hs' : 'ms';
  const accent = {youth:'#e8522a', hs:'#c0392b', ms:'#27ae60'}[scope];

  el.innerHTML = `<div class="member-list-card">
    <div class="member-list-header">
      <div class="member-list-title">📋 ${DK_NAME[currentDk]} 名單</div>
      <div class="member-count-badge" style="background:${accent}">${members.length} 人</div>
    </div>
    <div class="member-chips">
      ${members.length === 0
        ? '<div style="color:#aaa;font-size:13px">無符合條件的成員</div>'
        : members.map(m =>
            `<div class="member-chip">
              <span>${gIcon[m.g]}</span>
              <span>${m.n}</span>
              <span class="chip-group">${m.r}</span>
            </div>`
          ).join('')}
    </div>
  </div>`;
}

function selectScope(scope) {
  currentScope = scope;
  document.querySelectorAll('.scope-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.scope === scope));

  const cfg = SCOPE_CONFIG[scope];
  // Default to 大區 aggregate when scope changes
  currentDk = cfg.dk;
  renderDistrictRow();
  renderAll();
}

function selectDk(dk) {
  currentDk = dk;
  renderDistrictRow();
  renderAll();
}

    ...cfg.sub.map(d =>
      `<button class="district-btn ${currentDk===d.dk?'active':''}" data-dk="${d.dk}"
        onclick="selectDk('${d.dk}')">${d.name}</button>`)
  ].join('');
  document.getElementById('districtRow').innerHTML = btns;
}

function setGender(val, btn) {
  genderFilter = val;
  document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active-gender'));
  btn.classList.add('active-gender');
  renderAll();
}
function toggleAge(val, btn) {
  if (val === 'all') {
    ageFilter = new Set(['all']);
  } else {
    ageFilter.delete('all');
    if (ageFilter.has(val)) ageFilter.delete(val);
    else                    ageFilter.add(val);
    if (ageFilter.size === 0) ageFilter = new Set(['all']);
  }
  document.querySelectorAll('[data-age]').forEach(b => {
    b.classList.toggle('active-age', ageFilter.has(b.dataset.age));
  });
  renderAll();
}

function renderChart() {
  const segLabel = getSegLabel();
  const isAll = genderFilter === 'all' && ageIsAll();
  const viewName = DK_NAME[currentDk] || currentDk;

  document.getElementById('chartTitle').textContent =
    isAll
      ? `${viewName} — 各項出席人數`
      : `${viewName} · ${segLabel} — 各項出席`;
  document.getElementById('chartSubtitle').textContent =
    `每週實際到場人數（不含福音朋友）${!isAll ? ' · 族群：'+segLabel : ''}`;

  const datasets = Object.entries(ACT_COLORS).map(([act, clr]) => ({
    label: act,
    data: getSegData(currentDk, act),
    borderColor: clr.border,
    backgroundColor: clr.bg,
    borderWidth: 2.5,
    pointRadius: 3, pointHoverRadius: 6,
    tension: 0.3, fill: false,
  }));

  const monthBgPlugin = {
    id: 'monthBg',
    beforeDraw(chart) {
      const {ctx, chartArea:{top,bottom}, scales:{x}} = chart;
      if (!x) return;
      const mc = {'12月':'rgba(232,244,253,0.45)','1月':'rgba(254,249,231,0.45)',
                  '2月':'rgba(240,255,244,0.45)','3月':'rgba(253,242,248,0.45)'};
      ['12月','1月','2月','3月','4月'].forEach(m => {
        const idxs = WEEK_META.map((w,i) => w.month===m?i:-1).filter(i=>i>=0);
        if (!idxs.length) return;
        const step = x.getPixelForValue(1)-x.getPixelForValue(0);
        ctx.fillStyle = mc[m];
        ctx.fillRect(x.getPixelForValue(idxs[0])-step/2, top, idxs.length*step, bottom-top);
      });
    }
  };

  const cfg = {
    type: 'line',
    data: {labels: LABELS, datasets},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {position:'top', labels:{font:{size:12},boxWidth:12,padding:12}},
        tooltip: {
          callbacks: {
            title: items => {
              const w = WEEK_META[items[0].dataIndex];
              return `${w.month} 第${w.label.replace('W','')}週（${w.date}）`;
            },
            label: item => ` ${item.dataset.label}：${item.parsed.y} 人`,
          }
        },
      },
      scales: {
        x: {
          grid: {display:false},
          ticks: {
            font:{size:11},
            color: ctx => WEEK_META[ctx.index]?.first ? '#333' : '#aaa',
            maxRotation: 0,
            callback: (val,idx) => {
              const w = WEEK_META[idx];
              if (!w) return '';
              const line1 = w.first ? w.month + w.label : w.label;
              return [line1, w.date];
            },
          }
        },
        y: {
          beginAtZero: true,
          grid: {color:'rgba(0,0,0,0.05)'},
          ticks: {font:{size:11}, precision:0},
        }
      }
    },
    plugins: [monthBgPlugin],
  };

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('trendChart'), cfg);
}

function renderStats() {
  document.getElementById('statsRow').innerHTML =
    Object.entries(ACT_COLORS).map(([act, clr]) => {
      const vals = getSegData(currentDk, act);
      const last4 = vals.slice(-4);
      const prev4 = vals.slice(-8,-4);
      const avg4  = (last4.reduce((a,b)=>a+b,0)/last4.length).toFixed(1);
      const avgP  = prev4.length ? (prev4.reduce((a,b)=>a+b,0)/prev4.length).toFixed(1) : avg4;
      const diff  = (parseFloat(avg4)-parseFloat(avgP)).toFixed(1);
      const cls = diff>0?'trend-up':diff<0?'trend-down':'trend-flat';
      const str = diff>0?`▲ ${diff}`:diff<0?`▼ ${Math.abs(diff)}`:'— 持平';
      return `<div class="stat-card">
        <div class="stat-val" style="color:${clr.border}">${avg4}</div>
        <div class="stat-lbl">${act} 近4週均</div>
        <div class="stat-trend ${cls}">${str}</div>
        <div class="stat-note">大數字：最近4週出席人數的平均值<br>箭頭：與再前4週均值（${avgP}）相比</div>
      </div>`;
    }).join('');
}

function renderMonthBands() {
  const clrs = ['#2f80ed','#f39c12','#27ae60','#e8522a'];
  document.getElementById('monthBands').innerHTML =
    ['12月','1月','2月','3月'].map((m,i) =>
      `<div class="band">
        <div class="band-dot" style="background:${['#e8f4fd','#fef9e7','#f0fff4','#fdf2f8'][i]};border:1px solid ${clrs[i]}60"></div>
        <span style="color:#666;font-size:11px">${m==='12月'?'2025年12月':'2026年'+m}</span>
      </div>`
    ).join('');
}
