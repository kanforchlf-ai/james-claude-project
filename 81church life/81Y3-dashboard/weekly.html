function churchLifeCount(id) {
  return (MEMBERS[id] || []).filter(m =>
    m.a['小排'] || m.a['晨興'] || m.a['禱告'] || m.a['出訪'] || m.a['受訪']
  ).length;
}

function statusBadge(status) {
  if (status === 'unsubmitted') return '<span class="status-badge badge-unsubmitted">🔴 未提交</span>';
  if (status === 'low') return '<span class="status-badge badge-low">🟡 偏低</span>';
  return '<span class="status-badge badge-ok">🟢 正常</span>';
}

function renderDistrict(d) {
  const members = MEMBERS[d.id] || [];
  const pctStr = d.pct.toFixed(1);
  const marchDiff = d.total - d.march_avg;
  const diffLabel = marchDiff >= 0
    ? '<span class="up">▲' + marchDiff + '</span>'
    : '<span class="down">▼' + Math.abs(marchDiff) + '</span>';

  // Row table rows
  const rowsHtml = d.rows.map(r => {
    const isZero = r.count === 0;
    const rowName = r.name || '未分排';
    return `<tr class="${isZero ? 'zero-row' : ''}">
      <td>${rowName}</td>
      <td>${r.count} 人</td>
    </tr>`;
  }).join('');

  // Extra stats
  const extraHtml = Object.entries(d.extra).map(([k,v]) =>
    `<div class="extra-chip">${k} 出席<span>${v} 人</span></div>`
  ).join('');

  // Member chips (rendered dynamically via renderChips)
  const chipsHtml =
    `<div class="act-tabs" id="tabs-${d.id}">
      <span class="act-tab active" onclick="switchTab('${d.id}','主日',this)">主日</span>
      <span class="act-tab" onclick="switchTab('${d.id}','小排',this)">小排</span>
      <span class="act-tab" onclick="switchTab('${d.id}','晨興',this)">晨興</span>
      <span class="act-tab" onclick="switchTab('${d.id}','禱告',this)">禱告</span>
      <span class="act-tab" onclick="switchTab('${d.id}','出訪',this)">出訪</span>
      <span class="act-tab" onclick="switchTab('${d.id}','受訪',this)">受訪</span>
    </div>
    <div class="chip-legend">
      <span class="legend-item"><span class="legend-dot dot-normal"></span>本週有出席</span>
      <span class="legend-item"><span class="legend-dot dot-zero"></span>本週未出席</span>
      <span class="legend-rule">顯示近 6 週內任一活動有出席的成員（不含兒童）</span>
    </div>
    <div class="chips-wrap" id="chips-${d.id}"></div>`;

  const cardClass = d.status === 'unsubmitted' ? 'unsubmitted' : (d.status === 'low' ? 'low' : '');
  const fillPct = Math.min(d.pct, 100);
  const clCount = churchLifeCount(d.id);
  const clPct = d.base > 0 ? (clCount / d.base * 100).toFixed(1) : '0.0';

  return `
  <div class="district-card group-${d.group} ${cardClass}" id="card-${d.id}">
    <div class="card-header">
      <div class="district-name">${d.name}</div>
      ${statusBadge(d.status)}
    </div>
    <div class="card-body">
      <div class="attendance-row">
        <span class="attendance-label">主日出席</span>
        <span class="attendance-val">${d.total} / ${d.base} 人（${pctStr}%）</span>
      </div>
      <div class="attendance-row">
        <span class="attendance-label" style="color:rgba(167,139,250,0.7)">召會生活</span>
        <span class="attendance-val" style="color:#a78bfa">${clCount} / ${d.base} 人（${clPct}%）</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${fillPct}%"></div>
      </div>
      <div class="march-compare">三月平均：${d.march_avg} 人，本週 ${diffLabel} vs 上月均值</div>
      <table class="row-table">
        <thead><tr><th>排組</th><th>人數</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="extra-stats">${extraHtml}</div>
      <button class="toggle-btn" onclick="toggleMembers('${d.id}', this)">
        <span>展開成員名單</span>
        <span>▼</span>
      </button>
    </div>
    <div class="member-list" id="members-${d.id}">
      ${chipsHtml}
    </div>
  </div>`;
}

function renderChips(id, act) {
  const members = MEMBERS[id] || [];
  const wrap = document.getElementById('chips-' + id);
  if (!wrap) return;
  wrap.innerHTML = members.map(m => {
    const paiLabel = m.pai ? '<span class="chip-pai">' + m.pai + '</span>' : '';
    const attended = m.a ? m.a[act] : (act === '主日' ? (m.zero ? 0 : 1) : 0);
    if (attended) {
      return '<span class="member-chip chip-normal">' + m.n + ' ' + paiLabel + '</span>';
    } else {
      return '<span class="member-chip chip-absent">✗ ' + m.n + ' ' + paiLabel + '</span>';
    }
  }).join('');
}

function switchTab(id, act, tabEl) {
  document.querySelectorAll('#tabs-' + id + ' .act-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  renderChips(id, act);
}

function toggleMembers(id, btn) {
  const el = document.getElementById('members-' + id);
  const isOpen = el.classList.toggle('open');
  const arrow = btn.querySelector('span:last-child');
  const label = btn.querySelector('span:first-child');
  arrow.textContent = isOpen ? '▲' : '▼';
  label.textContent = isOpen ? '收合成員名單' : '展開成員名單';
  if (isOpen) renderChips(id, '主日');
}

const grid = document.getElementById('districtGrid');
DISTRICTS.forEach(d => {
  grid.innerHTML += renderDistrict(d);
});

const totalCL = Object.keys(MEMBERS).reduce((sum, id) => sum + churchLifeCount(id), 0);
document.getElementById('val-church-life').textContent = totalCL;
</script>
