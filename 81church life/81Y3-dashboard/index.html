<script>
(function(){
  const KEY = 'auth_81y3';
  const CORRECT = '5281';
  if (sessionStorage.getItem(KEY) !== CORRECT) {
    const input = prompt('請輸入密碼');
    if (input !== CORRECT) {
      document.documentElement.innerHTML = '<div style="font-family:sans-serif;text-align:center;margin-top:20%;color:#999">密碼錯誤</div>';
      throw new Error('unauthorized');
    }
    sessionStorage.setItem(KEY, CORRECT);
  }
})();
</script>

<button id="theme-toggle" title="切換閱讀模式" aria-label="切換亮色/暗色模式">🌙</button>
<script>
(function(){
  var btn = document.getElementById('theme-toggle');
  var html = document.documentElement;
  function apply(theme){
    html.setAttribute('data-theme', theme);
    btn.textContent = theme === 'light' ? '🌙' : '☀️';
    localStorage.setItem('theme_81y3', theme);
  }
  // Init icon from current state
  apply(html.getAttribute('data-theme') || 'dark');
  btn.addEventListener('click', function(){
    apply(html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
  });
})();
</script>
